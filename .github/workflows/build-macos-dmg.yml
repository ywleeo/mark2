name: Build macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts (e.g. v1.6.19)"
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: x86_64-apple-darwin
            arch_label: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            arch_label: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version sources
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(python -c "import re, pathlib; text = pathlib.Path('src-tauri/Cargo.toml').read_text(); match = re.search(r'^version = \\\"([^\\\"]+)\\\"', text, re.MULTILINE); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit('Unable to read Cargo.toml version')))")"
          echo "release tag version: ${TAG_VERSION}"
          echo "package.json version: ${PACKAGE_VERSION}"
          echo "tauri.conf.json version: ${TAURI_VERSION}"
          echo "Cargo.toml version: ${CARGO_VERSION}"
          [ "${PACKAGE_VERSION}" = "${TAG_VERSION}" ]
          [ "${TAURI_VERSION}" = "${TAG_VERSION}" ]
          [ "${CARGO_VERSION}" = "${TAG_VERSION}" ]

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/appstoreconnect"
          KEY_PATH="$RUNNER_TEMP/appstoreconnect/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY }}.p8"
          printf '%s' "${{ secrets.APP_STORE_CONNECT_KEY }}" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build signed DMG
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TARGET_TRIPLE: ${{ matrix.target }}
          OUTPUT_DIR: ${{ github.workspace }}/artifacts/${{ matrix.arch_label }}
        run: |
          set -euo pipefail
          bash ./.github/scripts/build-macos-dmg-ci.sh

      - name: Prepare updater artifacts
        shell: bash
        run: |
          set +e
          TARGET=${{ matrix.target }}
          ARCH=${{ matrix.arch_label }}
          BUNDLE_DIR=src-tauri/target/${TARGET}/release/bundle/macos
          TAR_GZ=$(find ${BUNDLE_DIR} -name '*.tar.gz' -not -name '*.sig' 2>/dev/null | head -1)
          TAR_GZ_SIG=$(find ${BUNDLE_DIR} -name '*.tar.gz.sig' 2>/dev/null | head -1)
          echo "TAR_GZ=${TAR_GZ}"
          echo "TAR_GZ_SIG=${TAR_GZ_SIG}"
          ls -la ${BUNDLE_DIR}/ || true
          if [[ -n "$TAR_GZ" && -f "$TAR_GZ" ]]; then
            cp "$TAR_GZ" "artifacts/${ARCH}/Mark2_${ARCH}.app.tar.gz"
          fi
          if [[ -n "$TAR_GZ_SIG" && -f "$TAR_GZ_SIG" ]]; then
            cp "$TAR_GZ_SIG" "artifacts/${ARCH}/Mark2_${ARCH}.app.tar.gz.sig"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            artifacts/${{ matrix.arch_label }}/*.dmg
            artifacts/${{ matrix.arch_label }}/*.tar.gz
            artifacts/${{ matrix.arch_label }}/*.tar.gz.sig

      - name: Sync DMG to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ARCH=${{ matrix.arch_label }}
          DMG=$(ls artifacts/$ARCH/*.dmg | head -1)
          FILENAME=$(basename $DMG)
          ENDPOINT=https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET=${{ secrets.R2_BUCKET_NAME }}

          # 上传到版本目录
          aws s3 cp $DMG s3://$BUCKET/mark2/$TAG/$FILENAME \
            --endpoint-url $ENDPOINT

          # 上传到 latest 目录，重命名
          aws s3 cp $DMG s3://$BUCKET/mark2/latest/Mark2_${ARCH}_latest.dmg \
            --endpoint-url $ENDPOINT

      - name: Sync updater artifacts to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ARCH=${{ matrix.arch_label }}
          TARGET=${{ matrix.target }}
          ENDPOINT=https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET=${{ secrets.R2_BUCKET_NAME }}
          BUNDLE_DIR=src-tauri/target/${TARGET}/release/bundle/macos

          TAR_GZ=$(find ${BUNDLE_DIR} -name '*.tar.gz' -not -name '*.sig' 2>/dev/null | head -1)
          TAR_GZ_SIG=$(find ${BUNDLE_DIR} -name '*.tar.gz.sig' 2>/dev/null | head -1)

          if [[ -n "$TAR_GZ" && -f "$TAR_GZ" && -n "$TAR_GZ_SIG" && -f "$TAR_GZ_SIG" ]]; then
            aws s3 cp $TAR_GZ s3://$BUCKET/mark2/latest/Mark2_${ARCH}_latest.app.tar.gz \
              --endpoint-url $ENDPOINT
            aws s3 cp $TAR_GZ_SIG s3://$BUCKET/mark2/latest/Mark2_${ARCH}_latest.app.tar.gz.sig \
              --endpoint-url $ENDPOINT
            aws s3 cp $TAR_GZ s3://$BUCKET/mark2/$TAG/Mark2_${ARCH}.app.tar.gz \
              --endpoint-url $ENDPOINT
            aws s3 cp $TAR_GZ_SIG s3://$BUCKET/mark2/$TAG/Mark2_${ARCH}.app.tar.gz.sig \
              --endpoint-url $ENDPOINT
          else
            echo "Warning: updater .tar.gz or .sig not found in ${BUNDLE_DIR}"
            ls -la ${BUNDLE_DIR}/ || true
          fi

      - name: Update macOS version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -sf -X POST "${{ secrets.SITE_API_BASE_URL }}/api/open/app/version" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Key: ${{ secrets.SITE_OPEN_AUTH_KEY }}" \
            -d "{\"platform\": \"mac\", \"version\": \"${VERSION}\"}"

      - name: Purge Cloudflare Cache for latest
        shell: bash
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://static.mark2app.com/mark2/latest/Mark2_${{ matrix.arch_label }}_latest.dmg"
              ]
            }'
