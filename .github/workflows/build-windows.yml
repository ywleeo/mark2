name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach artifacts (e.g. v1.5.5)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Validate version sources
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(python -c "import re, pathlib; text = pathlib.Path('src-tauri/Cargo.toml').read_text(); match = re.search(r'^version = \\\"([^\\\"]+)\\\"', text, re.MULTILINE); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit('Unable to read Cargo.toml version')))")"
          echo "release tag version: ${TAG_VERSION}"
          echo "package.json version: ${PACKAGE_VERSION}"
          echo "tauri.conf.json version: ${TAURI_VERSION}"
          echo "Cargo.toml version: ${CARGO_VERSION}"
          [ "${PACKAGE_VERSION}" = "${TAG_VERSION}" ]
          [ "${TAURI_VERSION}" = "${TAG_VERSION}" ]
          [ "${CARGO_VERSION}" = "${TAG_VERSION}" ]

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tauriScript: npx tauri

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Sync EXE/MSI to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ENDPOINT=https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET=${{ secrets.R2_BUCKET_NAME }}

          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)

          aws s3 cp $MSI s3://$BUCKET/mark2/$TAG/$(basename $MSI) \
            --endpoint-url $ENDPOINT
          aws s3 cp $EXE s3://$BUCKET/mark2/$TAG/$(basename $EXE) \
            --endpoint-url $ENDPOINT

          aws s3 cp $MSI s3://$BUCKET/mark2/latest/Mark2_windows_latest.msi \
            --endpoint-url $ENDPOINT
          aws s3 cp $EXE s3://$BUCKET/mark2/latest/Mark2_windows_latest.exe \
            --endpoint-url $ENDPOINT

          MSI_SIG=$(find src-tauri/target/release/bundle/msi -maxdepth 1 -name '*.msi.sig' | head -1)
          EXE_SIG=$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.exe.sig' | head -1)
          if [[ -n "$MSI_SIG" && -f "$MSI_SIG" ]]; then
            aws s3 cp $MSI_SIG s3://$BUCKET/mark2/latest/Mark2_windows_latest.msi.sig \
              --endpoint-url $ENDPOINT
          fi
          if [[ -n "$EXE_SIG" && -f "$EXE_SIG" ]]; then
            aws s3 cp $EXE_SIG s3://$BUCKET/mark2/latest/Mark2_windows_latest.exe.sig \
              --endpoint-url $ENDPOINT
          fi

      - name: Update Windows version
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -sf -X POST "${{ secrets.SITE_API_BASE_URL }}/api/open/app/version" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Key: ${{ secrets.SITE_OPEN_AUTH_KEY }}" \
            -d "{\"platform\": \"win\", \"version\": \"${VERSION}\"}"

      - name: Purge Cloudflare Cache for latest
        shell: bash
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://static.mark2app.com/mark2/latest/Mark2_windows_latest.msi",
                "https://static.mark2app.com/mark2/latest/Mark2_windows_latest.exe"
              ]
            }'
