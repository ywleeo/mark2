    1. 身体姿态（站、坐、蹲、前倾、后仰等）
    2. 头部朝向（低头、抬头、转头、侧头等）
    3. 眼神方向（目光落在XX上）
    4. 当前神情（眼睛状态+表情）
  - ✅ 正确示例：`母亲站在灶台前，身体微微前倾，低头看着锅里的食物，目光柔和专注，眼角带着满足的笑意`
  - ❌ 错误示例：`母亲看着锅里的食物`（缺少身体和头部动作）

  **3. 环境氛围描述**：
