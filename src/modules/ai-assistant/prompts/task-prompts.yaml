  - ✅ 正确：温馨的厨房，整齐摆放着食材和调料
  - ❌ 错误：墙上挂着腊肉、玉米串、蒜辫，桌上放着酱油瓶、调料罐
  - AI擅长根据氛围描述自然生成合理的环境细节

  **4. 遵守视觉规律**（极其重要）：
  - ⚠️ **描述的细节粒度必须和景别、机位相匹配**

  **景别决定可见细节**：
  - 全景/远景：整体形态、色彩分布、空间位置关系
  - 中景：人物表情、大致动作、物体整体形态
  - 近景/特写：面部细微表情、物体表面纹理、精细结构

