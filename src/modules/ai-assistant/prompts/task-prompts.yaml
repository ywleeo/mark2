  ## 任务：头脑风暴

  **原文/主题：**
  {selection}

  {contextBefore}
  {contextAfter}

  **头脑风暴原则：**
  1. **多角度发散**：从至少 5 个不同角度思考这个主题
  2. **跨界联想**：结合不同领域的思路，产生新的灵感
  3. **打破常规**：敢于提出非主流、反直觉的观点
  4. **具体可行**：每个想法都要有一定的可操作性

  **输出格式：**
  用列表形式输出 5-8 个不同角度的想法，每个想法包含：
  - 💡 **角度/切入点**：简要说明这个角度
  - 具体想法描述（2-3句话）

