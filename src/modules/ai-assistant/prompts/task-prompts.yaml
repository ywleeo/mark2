# AI 助手任务提示词配置
# 修改后需要重启应用生效

# 任务温度配置
temperatures:
  polish: 0.3      # 润色要保守
  continue: 0.8    # 续写需要创造性
  expand: 0.6      # 扩写中等创造性
  compress: 0.3    # 压缩要保守
  summarize: 0.4   # 总结要准确
  translate: 0.3   # 翻译要准确
  illustration: 0.7  # 插画需要创造性
  storyboard: 0.7    # 分镜需要创造性
  brainstorm: 0.9    # 头脑风暴需要高创造性
  slogan: 0.8        # Slogan需要创造性
  podcast_solo: 0.7  # 播客单人需要创造性
  podcast_duo: 0.7   # 播客双人需要创造性

# 任务标签
labels:
  polish: 润色
  continue: 续写
  expand: 扩写
  compress: 精简
  summarize: 总结
  translate: 翻译
  illustration: 插画
  storyboard: 分镜
  brainstorm: 脑暴
  slogan: Slogan
  podcast_solo: 播客单人
  podcast_duo: 播客双人

# 任务提示词模板
# 支持变量：{selection}, {context.before}, {context.after}, {style.person}, {style.tone}, {style.vocabulary}

polish: |
  ## 任务：润色优化

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}
  - 句式：{sentenceLength}

  **润色原则：**
  1. 表达更好：让表达更准确、更符合你的风格特点
  2. 减少瑕疵：修正明显的表达问题（重复、啰嗦、不通顺）
  3. 保持原意：核心观点和主要信息不变
  4. 风格一致：严格遵循你的风格特点进行优化

  **注意事项：**
  - 按照你的风格特点来润色，不要套用其他风格的标准
  - 如果你的风格是文艺/可爱/幽默等，可以适度增加修辞、情感表达
  - 如果你的风格是简洁/商务/理性等，则保持精练
  - 保持原文的人称（{style.person}）和语气（{style.tone}）

  **输出要求：**
  只输出润色后的文本，不要解释

continue: |
  ## 任务：续写

  **需要续写的部分：**
  {selection}

  {contextBefore}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **续写要求：**
  1. 无缝衔接：读者不应感觉到这是 AI 写的，必须自然过渡
  2. 风格一致：保持与前文相同的人称、语气、用词风格
  3. 内容合理：符合前文逻辑，推进内容发展
  4. 长度适中：续写 100-200 字，不要突然结束

  **输出格式：**
  只输出续写的内容，不要：
  - 加引号或标记
  - 写"续写如下"之类的说明
  - 重复原文

expand: |
  ## 任务：扩写

  ⚠️⚠️⚠️ 【最重要】你必须严格按照以下风格来写，否则就是失败：
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **风格示例（必看）：**
  - 如果是"淘宝"风格 → 必须有：卖货话术、产品卖点、促销信息、购买引导。禁止用文艺修辞。
  - 如果是"小红书"风格 → 必须有：种草语气、分享感、emoji、实用建议。禁止太商务。
  - 如果是"商务"风格 → 必须：专业严谨、数据支撑、逻辑清晰。禁止口语化。
  - 如果是"文艺"风格 → 必须有：修辞手法、意境营造。禁止太直白。
  - 其他风格同理，按照风格特点来写

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **扩写原则：**
  - 一句话 → 扩写成一段话（3-5句）
  - 一段话 → 扩写成一个完整内容（多个段落）
  - 一个提纲 → 扩写成一篇文章

  **创作要求：**
  1. 【提取核心元素】保留原文的核心思想、主题、观点、关键元素

  2. 【丰富内容，但要符合风格】基于核心元素进行扩展：
     - 添加具体场景、案例、细节（用你的风格来写）
     - 补充论述、分析、解释（用你的风格来写）
     - 发展新的角度和层次（用你的风格来写）
     - 加入对比、类比、引申（用你的风格来写）

  3. 【结构完整】：
     - 有开头、主体、结尾（用你的风格来写）
     - 内容层次分明、逻辑清晰
     - 详细展开，但不要过度冗长

  **再次强调：**
  从第一个字到最后一个字，都要体现 {style.tone} 的语气和 {style.vocabulary} 的用词风格。
  不要习惯性地用文艺风格写长文，要严格按照指定风格来写。

  **输出格式：**
  直接输出扩写后的内容，不要解释

compress: |
  ## 任务：精简压缩

  **原文：**
  {selection}
  （当前 {currentLength} 字）

  **精简策略：**
  1. 识别冗余：删除重复表达、同义词堆砌、过度修饰的形容词
  2. 提炼核心：每句话只保留最关键的信息，去掉铺垫和次要细节
  3. 合并句式：把啰嗦的几句话合并成一句简洁的表达
  4. 目标长度：约 {targetLength} 字

  **什么该删：**
  - 可有可无的例子、引申、补充说明
  - "众所周知"、"显而易见"等无意义的套话
  - 过度的情感渲染和修辞手法
  - 重复传达同一个意思的表述

  **什么该留：**
  - 核心论点和关键结论
  - 必要的数据、事实、专有名词
  - 逻辑链条中不可缺少的环节

  **风格要求：**
  保持原文的 {style.person} 和 {style.tone}，但要简洁有力

  **输出格式：**
  只输出精简后的内容，保持完整可读

summarize: |
  ## 任务：总结提炼

  **原文：**
  {selection}

  **总结方法：**
  1. 找核心观点：文章想传达什么主要信息？作者的核心立场是什么？
  2. 抓关键论据：支撑核心观点的最重要证据、数据、例子是什么？
  3. 提炼逻辑链：从开头到结尾，论述的逻辑线索是什么？
  4. 数量控制：提炼出 3-5 个关键要点（太少失真，太多不算总结）

  **要点标准：**
  每个要点应该：
  - 一句话说清楚（20-30字为宜）
  - 是原文确实表达的内容，不能推测或引申
  - 彼此之间不重复、不包含
  - 优先提炼结论性内容，而非过程性描述

  **输出格式：**
  使用列表格式，每个要点前加"- "，例如：
  - 要点1：xxx
  - 要点2：xxx
  - 要点3：xxx

translate: |
  ## 任务：直接翻译

  **原文：**
  {selection}

  **翻译要求：**
  1. 自动识别原文语言
  2. 如果原文是中文，翻译成英文
  3. 如果原文是非中文（英文、日文等），翻译成中文
  4. 翻译要准确、流畅

  **输出格式：**
  直接输出翻译结果，不要解释

illustration: |
  ## 任务：生成插画提示词

  根据以下文字内容，使用指定的艺术风格生成格式化的插画提示词。

  **原文：**
  {selection}

  **指定艺术风格：**
  {artStyle}

  **提示词结构（固定格式）：**
  [艺术风格] + [影像技术参数] + [画面构成] + [氛围情绪]

  其中：
  - 艺术风格：严格使用上面指定的 "{artStyle}"
  - 影像技术参数：包括景别、机位、光线、色彩、分辨率
  - 画面构成：主体 + 环境 + 细节（缺一不可）
  - 氛围情绪：整体氛围和情感基调

  **⚠️ 画面合理性原则（最重要）：**
  1. **文学修辞 ≠ 视觉画面**：原文中的比喻、夸张等修辞手法，不能直接转成画面
     - ❌ 错误示例："粗盐似雪花洒落" → 切白菜时撒盐（不合理）
     - ✅ 正确转化："粗盐似雪花洒落" → 砧板上放着一碟粗盐（合理）
  2. **符合物理逻辑**：人物动作、物品位置、场景布局必须符合真实世界的物理规律
  3. **符合生活常识**：日常场景的细节要符合实际生活习惯
  4. **可生成性**：画面描述要具体、清晰，AI绘图工具能理解和生成
  5. **提取核心意境，而非字面内容**：理解原文想表达的氛围和情感，用合理的画面呈现

  **生成步骤：**
  1. **【第一步：检查合理性】首先检查原文的描述，识别哪些是文学修辞、哪些是实际场景**
     - 比喻、夸张等修辞手法 ≠ 真实画面，必须转化
     - 思考：如果画出这个画面，符合物理规律吗？符合生活常识吗？
     - 示例：切菜时不会同时撒盐，这两个动作要分开或只保留一个

  2. **使用指定的艺术风格**：
     - ⚠️ **必须严格使用指定的艺术风格：{artStyle}**
     - 不要自己判断或改变艺术风格
     - 所有提示词中的艺术风格都使用 "{artStyle}"

  3. **确定专业的影像技术参数（必须完整）**：
     a) **固定参数（所有插画必须相同）**：
        - 光线：自然光/侧光/逆光/顶光/柔光/硬光/黄金时段光/蓝调时段光（必选）
        - 色彩方案：不只说"暖色调"，要具体如：
          * "金黄与赭石色为主，点缀深褐色"
          * "冷蓝与青灰色调，局部温暖橙黄"
          * "莫兰迪色系，低饱和度粉灰色调"
        - 色温：如"温暖色温3200K"、"日光色温5500K"、"冷色温6500K"
        - 调性：如"高对比度戏剧性调性"、"柔和低对比度调性"、"清新明亮调性"
        - 分辨率和质感：8K/4K，电影质感/细腻纹理/柔和颗粒感等

     b) **可变参数（每个插画可以不同）**：
        - 景别：全景/远景/中景/近景/特写
        - 机位：平视/俯视/仰视/侧面/斜侧45度

  4. **如果有人物，必须描述完整的人物信息（这是画面的灵魂）：**
     a) **种族/国籍（必须，极其重要）**：
        - ⚠️ **必须根据故事背景明确人物的种族/国籍**
        - 不要让AI自由发挥人物种族，否则容易出现文化错配
        - **常见故事背景对应的人物种族**：
          * 中国故事（如：过年、包饺子、农村生活）→ 明确写"中国人、亚洲面孔"
          * 日本故事（如：和室、榻榻米、武士）→ 明确写"日本人、亚洲面孔"
          * 韩国故事（如：韩服、泡菜、传统韩屋）→ 明确写"韩国人、亚洲面孔"
          * 美国故事（如：感恩节、牛仔、现代都市）→ 明确写"美国人、欧美面孔"或"美国亚裔"等
          * 法国故事（如：巴黎街头、法式咖啡馆）→ 明确写"法国人、欧洲面孔"
          * 俄罗斯故事（如：雪景、东正教堂）→ 明确写"俄罗斯人、斯拉夫面孔"
          * 其他地区同理，根据故事发生地判断
        - **艺术风格和人物种族是两回事**：
          * 可以用吉卜力风格画中国人、用黄海海报风格画美国人
          * 艺术风格由用户选择（{artStyle}），人物种族由故事内容决定

     b) **神情和眼神（必须，这是画面灵魂）**：
        - ⚠️ **没有具体的眼睛和神情描述，人物会显得呆滞、空洞，像智障一样**

        **眼睛状态（必须非常具体）**：
        - 眼睛形态：自然睁开、微眯、睁大、半眯、眼角微扬等
        - 眼神特征：清澈明亮、柔和温润、专注有神、目光如炬、眼神温暖等
        - 眼角细节：眼角带笑、眼尾下垂、眼角微扬等
        - ❌ 不要只说"眼神专注"，要说"双眼自然睁开，目光柔和而专注"

        **眼神方向（必须明确）**：
        - 看向哪里：低头看手中物品、抬头看向对方、侧头看向窗外、直视前方、目光落在XX上
        - ❌ 不要只说"看向食物"，要说"低头看着锅里的食物，目光落在咕嘟冒泡的汤面上"

        **表情和情绪**：
        - 嘴角、眉眼的配合：嘴角微扬、眉眼舒展、面带微笑等
        - 整体情绪：满足、愉悦、专注、温暖、思索、期待等

        **正确示例**：
        - ✅ "母亲双眼自然睁开，目光柔和而专注，低头看着锅里咕嘟冒泡的汤，眼角带着满足的笑意"
        - ✅ "父亲抬头看向母亲，眼睛微眯，眼神温暖，眼角带笑，目光中流露出期待"
        - ✅ "孩子仰头看向母亲，双眼睁大，眼神清澈明亮，充满好奇"

        **错误示例**：
        - ❌ "母亲看着食物，眼神专注"（太笼统，AI不知道怎么画眼睛）
        - ❌ "父亲看向母亲"（完全没有眼睛细节）

     c) **基础外貌（必须）**：
        - 年龄、性别、发型、服装、体型等

  5. **【关键】构建完整的画面（主体+环境+细节）**：
     a) 主体描写（符合视觉规律）：
        ⚠️ **描述的细节层级必须和景别、机位相匹配，不能违反视觉规律**

        **景别决定可见细节的粒度**：
        - 全景/远景：只能看到人物整体姿态、环境轮廓、色彩基调
        - 中景：可以看到人物表情、手部动作、物体的大致形态
        - 近景/特写：才能看到皮肤纹理、物体表面细节、细微表情变化

        **核心原则**：
        - 景别限定了观察距离，观察距离决定了能看到什么
        - 不要在远距离的景别中描述只有近距离才能观察到的细节
        - 物体的微观特征（纹理、细密的结构、精细的状态）只能在特写中描述

        **判断标准**：
        - 问自己：如果我站在这个距离，用肉眼能看到这个细节吗？
        - 如果答案是"看不到"，就不要写进提示词
        - 想强调精细特征，就选择特写景别，而不是在中远景强行要求细节

     b) 环境补全（模糊氛围描述）：
        ⚠️ **核心原则：主体详细，环境模糊**

        **正确的环境描述方式**：
        - 环境只需要交代氛围和整体感觉，让 AI 自由发挥
        - 不要列举具体物品，除非是特别重要的视觉元素
        - 用形容词描述环境特点，而不是名词列举物品

        **正确示例**：
        - ✅ "温馨的厨房，整齐摆放着食材和调料"
        - ✅ "传统的日式和室，简约整洁"
        - ✅ "老旧但干净的农村厨房，墙面挂着一些腊味"
        - ✅ "现代简约的客厅，温暖明亮"

        **错误示例**：
        - ❌ "墙上挂着腊肉、玉米串、蒜辫，桌上放着酱油瓶、调料罐，地上有竹筐"（过度具体，限制了AI发挥）
        - ❌ "窗台上摆着三样食物：一碟淋了香油的酸菜、一碗盛有宽粉和脊骨的澄黄热汤"（细节过多）

        **何时可以具体描述**：
        - 只有当某个物品对画面构成有特别设计意义时，才具体指定
        - 例如：海报设计中需要某个特定符号元素作为视觉焦点

        **重点强调**：
        - 主体部分要详细描述（人物、核心物体）
        - 环境部分用氛围词汇模糊描述
        - AI 擅长根据氛围描述自然生成合理的环境细节

     c) 视觉细节（必须具体可见）：
        - ✅ 可以描述：光影在某物体上的形状、物体的纹理质感、颜色对比
        - ❌ 不要描述：抽象情绪（"庄重与期待"）、无法可视化的感觉（"深厚内力"、"静谧的冷冽感"）
        - **艺术风格本身就包含了画面调性和氛围，不需要额外用文学化语言描述情绪**

     **重要**：
     - 主体要详细：人物动作、神情、服饰等要具体描述
     - 环境要模糊：用氛围词汇描述整体感觉，让AI自由发挥
     - 遵守视觉规律：细节描述必须符合景别允许的观察距离
     - AI 擅长根据氛围描述自然生成环境，不需要列举具体物品

  6. **智能决定生成数量（极其重要）**：

     **第一步：判断是否为海报风格**
     ⚠️⚠️⚠️ 如果艺术风格包含"海报"二字（如：黄海海报、漫威电影海报、极简主义海报等），必须执行海报创作逻辑：

     **海报创作逻辑（强制执行）**：
     1. **提炼中心思想**：阅读原文，理解整体要表达的核心意境、情感、主题
     2. **凝练关键元素**：从所有场景中提取最具代表性的1-2个核心元素
     3. **设计海报文字**：
        - 必须明确指定海报上的文字内容（标题、slogan等）
        - 文字要精炼，通常1-8个字
        - ⚠️ 强调不能有错字，否则会出现乱码
        - 文字应该提炼原文的核心主题或情感
     4. **生成单张海报**：用凝练的视觉语言呈现中心思想，只生成 1 张
     5. **禁止拆分场景**：不要因为原文有多个场景就生成多张"系列海报"

     海报的本质是凝练和概括，不是叙事性连续画面。即使原文很长、有多个场景，海报也只生成 1 张。

     **第二步：如果不是海报风格，再判断数量**

     **只生成 1 张的情况**：
     - 原文内容较短（少于 100 字）
     - 原文只描述一个静态场景、一个瞬间
     - 原文没有明显的场景变化、时间推进、视角转换

     **可以生成 2-3 张的情况**（必须同时满足）：
     - 非海报风格
     - 原文内容较长（100 字以上）
     - 原文有明显的场景变化（如：从厨房到餐厅）、时间推进（如：从准备到完成）、或视角转换（如：从全景到特写）
     - 每张图都能表达不同的叙事重点，不是简单重复

     **判断原则**：
     - 宁可生成 1 张精彩的，也不要生成 3 张重复的
     - 如果拿不准，默认生成 1 张

  **格式要求：**
  每个插画提示词必须严格按照以下顺序：
  1. 艺术风格：严格使用上面指定的 {artStyle}（所有插画完全相同）
  2. 景别+机位：每个插画可以变化，用于不同视角
  3. 光线+色彩+色温+调性+分辨率：所有插画完全相同，保证视觉统一
  4. 人物描述：种族+年龄+性别+外貌+服装+神情+眼神（如有人物，基础外貌所有插画完全相同，但神情和眼神可以根据场景变化）
     - 基础外貌（种族、年龄、发型、服装）必须完全一致
     - 神情和眼神根据当前场景变化（例如：第1幅专注切菜，第2幅抬头微笑看向家人）
  5. 画面构成：主体+环境氛围（每个插画变化）
     - ⚠️ 主体要详细：人物动作、神情、核心物体等要具体描述
     - ⚠️ 环境要模糊：用氛围词汇描述整体感觉，不要列举具体物品
     - ⚠️ 遵守视觉规律：细节描述必须符合景别的观察距离
     - ✅ 正确：温馨的厨房，整齐摆放着食材和调料
     - ❌ 错误：墙上挂着腊肉、玉米串、蒜辫，桌上放着酱油瓶、调料罐

  **语言要求：**
  ⚠️ 提示词必须100%纯中文
  - 所有描述都用中文
  - 保持格式化结构，方便复制

  **输出格式：**
  ⚠️ 直接输出以下结构化内容，不要添加任何口语化的回答（如"好的，我来..."）或执行步骤说明

  ⚠️⚠️⚠️ **如果是海报风格，只输出【插画 1】部分，直接删除【插画 2】和【插画 3】，不要有任何犹豫**

  === 固定设定（所有插画保持一致）===

  **艺术风格**：{artStyle}

  **人物设定**（如有）：[种族/国籍 + 年龄 + 性别 + 基础外貌 + 服装]
  - 示例：中国中年女性，亚洲面孔，低发髻，圆脸温和，穿藏蓝色碎花罩衣和素色围裙

  **环境设定**（必须，确保场景一致性）：
  - 地点：[具体地点，如：中国北方农村厨房、日本传统和室、现代公寓客厅]
  - 房间风格：[如：传统土坯房、现代简约、日式传统]
  - 墙面：[如：白灰墙、木板墙、贴白瓷砖]
  - 地面：[如：水泥地、木地板、瓷砖地]
  - 家具风格：[如：老式木质家具、现代不锈钢、传统榻榻米]
  - 整体时代感：[如：80年代、现代、传统]
  - 示例：中国北方80年代农村厨房，白灰墙面，水泥地面，老式木质橱柜和灶台，传统土灶或煤气灶，整体朴素温馨

  **基础影像参数**：
  - 色彩方案：[具体色彩，如：暖黄与赭石色为主，点缀深褐]
  - 调性：[如：柔和温馨调性、高对比戏剧性]
  - 分辨率/质感：[8K，细腻纹理等]

  === 可变设定（每个插画可以不同）===

  【插画 1】
  说明：[这幅插画的叙事作用]
  ⚠️ 如果是海报风格：
  - 说明应该写"提炼原文整体的中心思想和核心意境，用凝练的视觉语言呈现"
  - 必须指定海报上的文字内容（1-8个字），例如：海报文字："冬夜的温暖"
  - 强调不能有错字

  - 时间：[如：清晨、上午、午后、傍晚、夜晚]
  - 光线：[根据时间确定，如：清晨柔和侧光、午后强烈顶光、傍晚金黄逆光、夜晚室内暖光]
  - 景别：[全景/远景/中景/近景/特写]
  - 机位：[平视/俯视/仰视/侧面]
  - 是否需要人脸：[需要完整人脸/只需侧影或背影/只需身体局部（如手部）/不需要人物]
  ```
  [艺术风格], [景别], [机位], [时间+对应光线], [色彩方案], [调性], [分辨率], [人物状态：如有人物，描述当前动作+头部朝向+眼神方向+身体姿态，确保协调一致], [画面主体], [环境氛围：用形容词描述整体感觉，如"温馨的厨房，整齐摆放着食材和调料"], [如果是海报：海报文字"XXX"，不能有错字]
  ```

  【插画 2】⚠️⚠️⚠️ 海报风格直接删除此部分！非海报风格：只有在内容足够丰富且有明显场景变化时才生成
  说明：[这幅插画的叙事作用 - 必须和插画1有明显差异]
  - 时间：[可以和插画1不同，如从清晨到午后]
  - 光线：[根据时间变化，如：从柔和侧光变为强烈顶光]
  - 景别：[可以变化]
  - 机位：[可以变化]
  - 是否需要人脸：[根据叙事需要]
  ```
  [艺术风格], [景别], [机位], [时间+对应光线], [色彩方案], [调性], [分辨率], [人物状态], [画面主体], [环境氛围：用形容词描述整体感觉]
  ```

  【插画 3】⚠️⚠️⚠️ 海报风格直接删除此部分！非海报风格：只有在内容非常丰富且有多个场景层次时才生成
  说明：[这幅插画的叙事作用 - 必须和前两幅都有明显差异]
  - 时间：[继续变化或保持]
  - 光线：[对应时间]
  - 景别：[可以变化]
  - 机位：[可以变化]
  - 是否需要人脸：[根据叙事需要]
  ```
  [艺术风格], [景别], [机位], [时间+对应光线], [色彩方案], [调性], [分辨率], [人物状态], [画面主体], [环境氛围：用形容词描述整体感觉]
  ```

  **重要：新结构的核心逻辑**

  **1. 固定设定（所有插画必须一致）**：
  - ⚠️ **艺术风格**：严格使用指定的 {artStyle}，不要自己判断或改变
  - ⚠️ **环境设定**：地点、房间风格、墙面、地面、家具风格、时代感
    * 即使时间变化（从清晨到夜晚），环境本身不变
    * 即使人物在同一屋子里改变位置，屋子风格必须一致
  - ⚠️ **人物基础外貌**：种族、年龄、发型、服装、体型（必须完全相同）
  - ⚠️ **色彩方案、调性、分辨率**：保证视觉统一

  **2. 可变设定（每幅插画可以不同）**：
  - **时间**：可以从清晨到夜晚变化
  - **光线**：必须跟随时间变化（清晨柔和侧光 → 午后强烈顶光 → 夜晚室内暖光）
  - **景别和机位**：可以变化，用于不同叙事视角
  - **是否需要人脸**：根据叙事需要灵活选择
    * 需要完整人脸：表现人物情绪、对话、表情
    * 只需侧影或背影：营造氛围、保护隐私、引导视线
    * 只需身体局部（如手部特写）：强调动作细节
    * 不需要人物：环境描写、物品特写
  - **人物状态**：当前动作、头部朝向、眼神方向、身体姿态
  - **画面主体和环境氛围**：
    * 主体要详细：人物动作、神情、核心物体等要具体描述
    * 环境要模糊：用氛围词汇描述整体感觉，不要列举具体物品

  **3. 身体-头部-眼神协调（极其重要）**：
  - ⚠️ **眼神方向必须和头部朝向、身体姿态协调一致**
  - 正确示例：
    * ✅ "低头看锅，身体前倾靠近灶台，目光落在锅里"（协调）
    * ✅ "侧身转头看向门口，眼神望向来人"（协调）
    * ✅ "站直身体，抬头仰视天空，目光向上"（协调）
  - 错误示例：
    * ❌ "身体离锅很近，但眼睛看向锅"（身体近、头部应该低头或平视，但这里没说头部动作）
    * ❌ "看向食物，但身体转向相反方向"（不协调）
  - **描述原则**：
    1. 先描述身体姿态（站、坐、蹲、前倾、后仰等）
    2. 再描述头部朝向（低头、抬头、转头、侧头等）
    3. 最后描述眼神方向（目光落在XX上）
    4. 确保三者形成自然的动作链

  **4. 代码块格式要求**：
  - ⚠️ 提示词必须100%纯中文
  - 每个插画的提示词必须包含完整参数
  - **主体要详细**：人物动作 + 头部朝向 + 眼神方向 + 身体姿态（确保协调）
  - **环境要模糊**：用氛围词汇描述整体感觉，不要列举具体物品
    * ✅ 正确："温馨的厨房，整齐摆放着食材和调料"
    * ❌ 错误：详细列举环境中的每个具体物品
  - **遵守视觉规律**：细节粒度必须符合景别的观察距离
    * 全景/远景：整体形态、色彩、空间关系
    * 中景：表情、姿态、物体大致形态
    * 近景/特写：微观细节、纹理、精细特征
    * 原则：问自己"站在这个距离能看到吗？"
  - **海报必须有文字**：如果是海报风格，必须明确指定海报文字内容，强调不能有错字

  **5. 人物种族/国籍约束（极其重要）**：
  - ⚠️ **必须根据故事背景明确人物的种族/国籍**
  - 不要让AI自由发挥人物种族，否则容易出现文化错配
  - **常见故事背景对应的人物种族**：
    * 中国故事（如：过年、包饺子、农村生活）→ 明确写"中国人、亚洲面孔"
    * 日本故事（如：和室、榻榻米、武士）→ 明确写"日本人、亚洲面孔"
    * 韩国故事（如：韩服、泡菜、传统韩屋）→ 明确写"韩国人、亚洲面孔"
    * 美国故事（如：感恩节、牛仔、现代都市）→ 明确写"美国人、欧美面孔"或"美国亚裔"等
    * 法国故事（如：巴黎街头、法式咖啡馆）→ 明确写"法国人、欧洲面孔"
    * 俄罗斯故事（如：雪景、东正教堂）→ 明确写"俄罗斯人、斯拉夫面孔"
    * 其他地区同理，根据故事发生地判断
  - **艺术风格和人物种族是两回事**：
    * 可以用宫崎骏风格画中国人、用黄海海报风格画美国人
    * 艺术风格由用户选择（{artStyle}），人物种族由故事内容决定

