# AI 助手任务提示词配置
# 修改后需要重启应用生效

# 任务温度配置
temperatures:
  polish: 0.3      # 润色要保守
  continue: 0.8    # 续写需要创造性
  expand: 0.6      # 扩写中等创造性
  compress: 0.3    # 压缩要保守
  summarize: 0.4   # 总结要准确
  translate: 0.3   # 翻译要准确

# 任务标签
labels:
  polish: 润色
  continue: 续写
  expand: 扩写
  compress: 精简
  summarize: 总结
  translate: 翻译

# 任务提示词模板
# 支持变量：{selection}, {context.before}, {context.after}, {style.person}, {style.tone}, {style.vocabulary}

polish: |
  ## 任务：润色优化

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}
  - 句式：{sentenceLength}

  **润色原则：**
  1. 表达更好：让表达更准确、更符合你的风格特点
  2. 减少瑕疵：修正明显的表达问题（重复、啰嗦、不通顺）
  3. 保持原意：核心观点和主要信息不变
  4. 风格一致：严格遵循你的风格特点进行优化

  **注意事项：**
  - 按照你的风格特点来润色，不要套用其他风格的标准
  - 如果你的风格是文艺/可爱/幽默等，可以适度增加修辞、情感表达
  - 如果你的风格是简洁/商务/理性等，则保持精练
  - 保持原文的人称（{style.person}）和语气（{style.tone}）

  **输出要求：**
  只输出润色后的文本，不要解释

continue: |
  ## 任务：续写

  **需要续写的部分：**
  {selection}

  {contextBefore}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **续写要求：**
  1. 无缝衔接：读者不应感觉到这是 AI 写的，必须自然过渡
  2. 风格一致：保持与前文相同的人称、语气、用词风格
  3. 内容合理：符合前文逻辑，推进内容发展
  4. 长度适中：续写 100-200 字，不要突然结束

  **输出格式：**
  只输出续写的内容，不要：
  - 加引号或标记
  - 写"续写如下"之类的说明
  - 重复原文

expand: |
  ## 任务：扩写（基于核心元素的创作）

  **原文（提供核心元素）：**
  {selection}

  {contextBefore}
  {contextAfter}

  **创作目标：**
  - 一句话 → 创作成一段话（充分展开，写够内容）
  - 一段话 → 创作成一篇文章（自由发挥，写出深度和广度）
  - ⚠️ 不要怕写太长，要充分展开、丰富内容、有深度

  **理解任务：**
  这不是"补充"原文，而是基于原文核心元素的"新创作"。
  原文只是提供了种子（核心思想、主题、关键元素），你要基于这颗种子自由创作出完整作品。

  **创作要求（大胆发挥）：**
  1. 【提取核心元素】原文给了什么必须保留的：
     - 核心思想、主题、观点
     - 关键元素、意象、情感基调
     - 这些是种子，必须保留

  2. 【丰富创作内容】基于核心元素，大胆自由创作：
     - 创作新的场景、案例、故事、细节
     - 创作新的描写、论述、分析
     - 发展新的角度、层次、视角、延伸
     - 加入对比、类比、引申、深化
     - 原文没说的，都可以创作
     - 不要保守，要充分展开

  3. 【构建完整丰富的作品】：
     - 有开头、主体、结尾的完整结构
     - 内容要丰富、有层次、有深度
     - 详细展开，不要点到为止
     - 像一篇完整的原创作品

  4. 【创作原则】
     - 保持核心元素不变
     - 其他内容完全自由创作
     - 充分展开，想写多少写多少
     - 每句话都有价值，推动内容
     - 不要担心写太长，重要的是写得好、写得丰富

  **风格要求：**
  - 严格遵循 {style.person}、{style.tone}、{style.vocabulary}
  - 按照你的写作风格充分发挥
  - 扩写就是要丰富内容，大胆创作
  - 写出深度、广度、层次感

  **输出格式：**
  直接输出创作的完整内容，不要解释

compress: |
  ## 任务：精简压缩

  **原文：**
  {selection}
  （当前 {currentLength} 字）

  **精简策略：**
  1. 识别冗余：删除重复表达、同义词堆砌、过度修饰的形容词
  2. 提炼核心：每句话只保留最关键的信息，去掉铺垫和次要细节
  3. 合并句式：把啰嗦的几句话合并成一句简洁的表达
  4. 目标长度：约 {targetLength} 字

  **什么该删：**
  - 可有可无的例子、引申、补充说明
  - "众所周知"、"显而易见"等无意义的套话
  - 过度的情感渲染和修辞手法
  - 重复传达同一个意思的表述

  **什么该留：**
  - 核心论点和关键结论
  - 必要的数据、事实、专有名词
  - 逻辑链条中不可缺少的环节

  **风格要求：**
  保持原文的 {style.person} 和 {style.tone}，但要简洁有力

  **输出格式：**
  只输出精简后的内容，保持完整可读

summarize: |
  ## 任务：总结提炼

  **原文：**
  {selection}

  **总结方法：**
  1. 找核心观点：文章想传达什么主要信息？作者的核心立场是什么？
  2. 抓关键论据：支撑核心观点的最重要证据、数据、例子是什么？
  3. 提炼逻辑链：从开头到结尾，论述的逻辑线索是什么？
  4. 数量控制：提炼出 3-5 个关键要点（太少失真，太多不算总结）

  **要点标准：**
  每个要点应该：
  - 一句话说清楚（20-30字为宜）
  - 是原文确实表达的内容，不能推测或引申
  - 彼此之间不重复、不包含
  - 优先提炼结论性内容，而非过程性描述

  **输出格式：**
  使用列表格式，每个要点前加"- "，例如：
  - 要点1：xxx
  - 要点2：xxx
  - 要点3：xxx

translate: |
  ## 任务：智能翻译

  **原文：**
  {selection}

  **翻译要求：**
  1. 自动识别原文语言
  2. 如果原文是中文，翻译成英文
  3. 如果原文是非中文（英文、日文等），翻译成中文
  4. 保持原文的语气和风格
  5. 翻译要准确、流畅、自然

  **输出格式：**
  只输出翻译后的文本，不要添加任何解释或说明
