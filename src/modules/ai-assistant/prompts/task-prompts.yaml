# AI 助手任务提示词配置
# 修改后需要重启应用生效

# 任务温度配置
temperatures:
  polish: 0.3      # 润色要保守
  continue: 0.8    # 续写需要创造性
  expand: 0.6      # 扩写中等创造性
  compress: 0.3    # 压缩要保守
  summarize: 0.4   # 总结要准确
  rewrite: 0.5     # 改写中等
  changeStyle: 0.4 # 风格转换适中
  translate: 0.3   # 翻译要准确

# 任务标签
labels:
  polish: 润色
  continue: 续写
  expand: 扩写
  compress: 精简
  summarize: 总结
  rewrite: 改写
  changeStyle: 转换风格
  translate: 翻译

# 任务提示词模板
# 支持变量：{selection}, {context.before}, {context.after}, {style.person}, {style.tone}, {style.vocabulary}

polish: |
  ## 任务：润色优化

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}
  - 句式：{sentenceLength}

  **优化方向（按优先级）：**
  1. 清晰度：如有表达不清的地方，改得更明确
  2. 简洁性：删除冗余，保留核心信息
  3. 流畅度：优化句式衔接
  4. 准确性：用词更精准

  **严格要求：**
  - 保持原文的人称（{style.person}）和语气（{style.tone}）
  - 保持用词风格（{style.vocabulary}）
  - 不改变核心观点和主要信息
  - 只输出润色后的文本，不要解释

continue: |
  ## 任务：续写

  **需要续写的部分：**
  {selection}

  {contextBefore}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **续写要求：**
  1. 无缝衔接：读者不应感觉到这是 AI 写的，必须自然过渡
  2. 风格一致：保持与前文相同的人称、语气、用词风格
  3. 内容合理：符合前文逻辑，推进内容发展
  4. 长度适中：续写 100-200 字，不要突然结束

  **输出格式：**
  只输出续写的内容，不要：
  - 加引号或标记
  - 写"续写如下"之类的说明
  - 重复原文

expand: |
  ## 任务：扩写

  **原文（较简略）：**
  {selection}

  {contextBefore}
  {contextAfter}

  **扩写策略：**
  1. 补充细节：增加具体描写、例子、数据
  2. 丰富层次：让内容更饱满，但不啰嗦
  3. 保持节奏：扩写要自然，不能为了凑字数而水
  4. 目标长度：约 {targetLength} 字

  **风格要求：**
  - 保持 {style.person}
  - 保持 {style.tone} 的语气
  - 保持 {style.vocabulary} 的用词风格

  **输出格式：**
  只输出扩写后的完整段落

compress: |
  ## 任务：精简压缩

  **原文：**
  {selection}
  （当前 {currentLength} 字）

  **精简策略：**
  1. 识别冗余：删除重复表达、同义词堆砌、过度修饰的形容词
  2. 提炼核心：每句话只保留最关键的信息，去掉铺垫和次要细节
  3. 合并句式：把啰嗦的几句话合并成一句简洁的表达
  4. 目标长度：约 {targetLength} 字

  **什么该删：**
  - 可有可无的例子、引申、补充说明
  - "众所周知"、"显而易见"等无意义的套话
  - 过度的情感渲染和修辞手法
  - 重复传达同一个意思的表述

  **什么该留：**
  - 核心论点和关键结论
  - 必要的数据、事实、专有名词
  - 逻辑链条中不可缺少的环节

  **风格要求：**
  保持原文的 {style.person} 和 {style.tone}，但要简洁有力

  **输出格式：**
  只输出精简后的内容，保持完整可读

summarize: |
  ## 任务：总结提炼

  **原文：**
  {selection}

  **总结方法：**
  1. 找核心观点：文章想传达什么主要信息？作者的核心立场是什么？
  2. 抓关键论据：支撑核心观点的最重要证据、数据、例子是什么？
  3. 提炼逻辑链：从开头到结尾，论述的逻辑线索是什么？
  4. 数量控制：提炼出 3-5 个关键要点（太少失真，太多不算总结）

  **要点标准：**
  每个要点应该：
  - 一句话说清楚（20-30字为宜）
  - 是原文确实表达的内容，不能推测或引申
  - 彼此之间不重复、不包含
  - 优先提炼结论性内容，而非过程性描述

  **输出格式：**
  使用列表格式，每个要点前加"- "，例如：
  - 要点1：xxx
  - 要点2：xxx
  - 要点3：xxx

rewrite: |
  ## 任务：改写

  **原文：**
  {selection}

  {contextBefore}

  **改写策略（从以下角度换表达）：**
  1. 句式调整：长句拆短/短句合并，主动被动互换，调整语序
  2. 用词替换：找同义词、近义词替换关键词（保持准确性）
  3. 逻辑重组：调整内容的呈现顺序，但不改变因果关系
  4. 修辞变换：比喻换成直述，或直述换成比喻

  **具体操作：**
  - 原句用"因为...所以..."，可以改成"由于...从而..."
  - 原句用"A导致B"，可以改成"B源于A"
  - 原句是并列句，可以改成递进或转折关系（如果逻辑允许）
  - 关键名词、专有名词保持不变

  **严格要求：**
  - 核心意思必须一致，不能曲解原意
  - 保持 {style.person} 和 {style.tone}
  - 改写要自然，不能生硬拼凑

  **输出格式：**
  只输出改写后的内容

changeStyle: |
  ## 任务：转换风格

  **原文：**
  {selection}

  **目标风格：**
  {targetStyleName}

  {targetStyleDescription}

  **输出格式：**
  只输出转换后的内容，不要解释

translate: |
  ## 任务：智能翻译

  **原文：**
  {selection}

  **翻译要求：**
  1. 自动识别原文语言
  2. 如果原文是中文，翻译成英文
  3. 如果原文是非中文（英文、日文等），翻译成中文
  4. 保持原文的语气和风格
  5. 翻译要准确、流畅、自然

  **输出格式：**
  只输出翻译后的文本，不要添加任何解释或说明

# 风格转换说明
styleDescriptions:
  formal: |
    **转换策略（书面语）：**
    1. 用词正式：避免口语词汇，使用规范的书面语表达
    2. 句式规整：使用完整句式，避免省略和简化
    3. 逻辑严谨：使用"因此"、"然而"、"鉴于"等正式连接词
    4. 去除口语化特征：删除语气词、感叹词、重复表达

    **具体要求：**
    - 将口语词替换为书面语（如"很多"→"诸多"、"弄"→"处理"）
    - 补全省略的主语、宾语
    - 使用较长的、结构完整的句子
    - 保持客观、中性的语气

  casual: |
    **转换策略（口语化）：**
    1. 用词简单直白：把书面语、文绉绉的词换成日常说话的词
    2. 句式灵活自然：可以用短句、断句，像说话一样有节奏感
    3. 增加语气感：可以适当用"吧"、"呢"、"啊"等语气词，让表达更生动
    4. 去掉正式感：把"因此"、"鉴于"、"诸如此类"这类词换成"所以"、"因为"、"比如"

    **具体操作：**
    - 书面词换日常词（如"诸多"→"很多"、"获悉"→"知道"、"处理"→"弄"）
    - 长句拆成短句，一句话说一个意思
    - 可以省略不必要的主语、连接词
    - 用"其实"、"就是"、"反正"这类口语词增加亲切感
    - 适当使用反问、感叹，增加对话感
