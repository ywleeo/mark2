# AI 助手任务提示词配置
# 修改后需要重启应用生效

# 任务温度配置
temperatures:
  polish: 0.3      # 润色要保守
  continue: 0.8    # 续写需要创造性
  expand: 0.6      # 扩写中等创造性
  compress: 0.3    # 压缩要保守
  summarize: 0.4   # 总结要准确
  translate: 0.3   # 翻译要准确
  illustration: 0.7  # 插画需要创造性
  storyboard: 0.7    # 分镜需要创造性

# 任务标签
labels:
  polish: 润色
  continue: 续写
  expand: 扩写
  compress: 精简
  summarize: 总结
  translate: 翻译
  illustration: 插画
  storyboard: 分镜

# 任务提示词模板
# 支持变量：{selection}, {context.before}, {context.after}, {style.person}, {style.tone}, {style.vocabulary}

polish: |
  ## 任务：润色优化

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}
  - 句式：{sentenceLength}

  **润色原则：**
  1. 表达更好：让表达更准确、更符合你的风格特点
  2. 减少瑕疵：修正明显的表达问题（重复、啰嗦、不通顺）
  3. 保持原意：核心观点和主要信息不变
  4. 风格一致：严格遵循你的风格特点进行优化

  **注意事项：**
  - 按照你的风格特点来润色，不要套用其他风格的标准
  - 如果你的风格是文艺/可爱/幽默等，可以适度增加修辞、情感表达
  - 如果你的风格是简洁/商务/理性等，则保持精练
  - 保持原文的人称（{style.person}）和语气（{style.tone}）

  **输出要求：**
  只输出润色后的文本，不要解释

continue: |
  ## 任务：续写

  **需要续写的部分：**
  {selection}

  {contextBefore}

  **文档风格特征：**
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **续写要求：**
  1. 无缝衔接：读者不应感觉到这是 AI 写的，必须自然过渡
  2. 风格一致：保持与前文相同的人称、语气、用词风格
  3. 内容合理：符合前文逻辑，推进内容发展
  4. 长度适中：续写 100-200 字，不要突然结束

  **输出格式：**
  只输出续写的内容，不要：
  - 加引号或标记
  - 写"续写如下"之类的说明
  - 重复原文

expand: |
  ## 任务：扩写

  ⚠️⚠️⚠️ 【最重要】你必须严格按照以下风格来写，否则就是失败：
  - 人称：{style.person}
  - 语气：{style.tone}
  - 用词：{style.vocabulary}

  **风格示例（必看）：**
  - 如果是"淘宝"风格 → 必须有：卖货话术、产品卖点、促销信息、购买引导。禁止用文艺修辞。
  - 如果是"小红书"风格 → 必须有：种草语气、分享感、emoji、实用建议。禁止太商务。
  - 如果是"商务"风格 → 必须：专业严谨、数据支撑、逻辑清晰。禁止口语化。
  - 如果是"文艺"风格 → 必须有：修辞手法、意境营造。禁止太直白。
  - 其他风格同理，按照风格特点来写

  **原文：**
  {selection}

  {contextBefore}
  {contextAfter}

  **扩写原则：**
  - 一句话 → 扩写成一段话（3-5句）
  - 一段话 → 扩写成一个完整内容（多个段落）
  - 一个提纲 → 扩写成一篇文章

  **创作要求：**
  1. 【提取核心元素】保留原文的核心思想、主题、观点、关键元素

  2. 【丰富内容，但要符合风格】基于核心元素进行扩展：
     - 添加具体场景、案例、细节（用你的风格来写）
     - 补充论述、分析、解释（用你的风格来写）
     - 发展新的角度和层次（用你的风格来写）
     - 加入对比、类比、引申（用你的风格来写）

  3. 【结构完整】：
     - 有开头、主体、结尾（用你的风格来写）
     - 内容层次分明、逻辑清晰
     - 详细展开，但不要过度冗长

  **再次强调：**
  从第一个字到最后一个字，都要体现 {style.tone} 的语气和 {style.vocabulary} 的用词风格。
  不要习惯性地用文艺风格写长文，要严格按照指定风格来写。

  **输出格式：**
  直接输出扩写后的内容，不要解释

compress: |
  ## 任务：精简压缩

  **原文：**
  {selection}
  （当前 {currentLength} 字）

  **精简策略：**
  1. 识别冗余：删除重复表达、同义词堆砌、过度修饰的形容词
  2. 提炼核心：每句话只保留最关键的信息，去掉铺垫和次要细节
  3. 合并句式：把啰嗦的几句话合并成一句简洁的表达
  4. 目标长度：约 {targetLength} 字

  **什么该删：**
  - 可有可无的例子、引申、补充说明
  - "众所周知"、"显而易见"等无意义的套话
  - 过度的情感渲染和修辞手法
  - 重复传达同一个意思的表述

  **什么该留：**
  - 核心论点和关键结论
  - 必要的数据、事实、专有名词
  - 逻辑链条中不可缺少的环节

  **风格要求：**
  保持原文的 {style.person} 和 {style.tone}，但要简洁有力

  **输出格式：**
  只输出精简后的内容，保持完整可读

summarize: |
  ## 任务：总结提炼

  **原文：**
  {selection}

  **总结方法：**
  1. 找核心观点：文章想传达什么主要信息？作者的核心立场是什么？
  2. 抓关键论据：支撑核心观点的最重要证据、数据、例子是什么？
  3. 提炼逻辑链：从开头到结尾，论述的逻辑线索是什么？
  4. 数量控制：提炼出 3-5 个关键要点（太少失真，太多不算总结）

  **要点标准：**
  每个要点应该：
  - 一句话说清楚（20-30字为宜）
  - 是原文确实表达的内容，不能推测或引申
  - 彼此之间不重复、不包含
  - 优先提炼结论性内容，而非过程性描述

  **输出格式：**
  使用列表格式，每个要点前加"- "，例如：
  - 要点1：xxx
  - 要点2：xxx
  - 要点3：xxx

translate: |
  ## 任务：智能翻译

  **原文：**
  {selection}

  **翻译要求：**
  1. 自动识别原文语言
  2. 如果原文是中文，翻译成英文
  3. 如果原文是非中文（英文、日文等），翻译成中文
  4. 保持原文的语气和风格
  5. 翻译要准确、流畅、自然

  **输出格式：**
  只输出翻译后的文本，不要添加任何解释或说明

illustration: |
  ## 任务：生成插画提示词

  根据以下文字内容，生成格式化的插画提示词。

  **原文：**
  {selection}

  **提示词结构（固定格式）：**
  [艺术风格] + [影像技术参数] + [画面构成] + [氛围情绪]

  其中：
  - 艺术风格：必须指定具体艺术家/工作室/明确流派
  - 影像技术参数：包括景别、机位、光线、色彩、分辨率
  - 画面构成：主体 + 环境 + 细节（缺一不可）
  - 氛围情绪：整体氛围和情感基调

  **⚠️ 画面合理性原则（最重要）：**
  1. **文学修辞 ≠ 视觉画面**：原文中的比喻、夸张等修辞手法，不能直接转成画面
     - ❌ 错误示例："粗盐似雪花洒落" → 切白菜时撒盐（不合理）
     - ✅ 正确转化："粗盐似雪花洒落" → 砧板上放着一碟粗盐（合理）
  2. **符合物理逻辑**：人物动作、物品位置、场景布局必须符合真实世界的物理规律
  3. **符合生活常识**：日常场景的细节要符合实际生活习惯
  4. **可生成性**：画面描述要具体、清晰，AI绘图工具能理解和生成
  5. **提取核心意境，而非字面内容**：理解原文想表达的氛围和情感，用合理的画面呈现

  **生成步骤：**
  1. **【第一步：检查合理性】首先检查原文的描述，识别哪些是文学修辞、哪些是实际场景**
     - 比喻、夸张等修辞手法 ≠ 真实画面，必须转化
     - 思考：如果画出这个画面，符合物理规律吗？符合生活常识吗？
     - 示例：切菜时不会同时撒盐，这两个动作要分开或只保留一个

  2. **确定具体的艺术风格（必须精准且匹配文化背景）**：
     - ⚠️ **插画必须是绘画风格，不能是真人照片风格**
     - ⚠️ **艺术风格必须匹配故事的文化背景**：
       * 中国故事 → 用中国传统绘画风格（工笔画、年画、水墨画、国画等）
       * 日本故事 → 用日本绘画风格（浮世绘、日本动画风格等）
       * 西方故事 → 用西方绘画风格（印象派、油画、水彩等）
     - ✅ 具体艺术家：如"宫崎骏风格"、"新海诚风格"
     - ✅ 具体工作室：如"吉卜力工作室风格"、"皮克斯动画风格"
     - ✅ 明确流派：如"印象派风格"、"中国工笔画风格"、"日本浮世绘风格"、"水彩插画风格"、"油画风格"、"扁平插画风格"、"中国年画风格"、"水墨淡彩风格"
     - ❌ 避免模糊：不要只说"插画风格"、"水彩风格"、"动漫风格"
     - ❌ 禁止真人照片类风格：不要使用"黄海海报风格"、"摄影风格"、"写实人像风格"等基于真人照片的风格
     - ❌ 避免文化错配：不要用维米尔（荷兰）画中国故事，不要用莫奈（法国）画日本故事

  3. **确定专业的影像技术参数（必须完整）**：
     a) **固定参数（所有插画必须相同）**：
        - 光线：自然光/侧光/逆光/顶光/柔光/硬光/黄金时段光/蓝调时段光（必选）
        - 色彩方案：不只说"暖色调"，要具体如：
          * "金黄与赭石色为主，点缀深褐色"
          * "冷蓝与青灰色调，局部温暖橙黄"
          * "莫兰迪色系，低饱和度粉灰色调"
        - 色温：如"温暖色温3200K"、"日光色温5500K"、"冷色温6500K"
        - 调性：如"高对比度戏剧性调性"、"柔和低对比度调性"、"清新明亮调性"
        - 分辨率和质感：8K/4K，电影质感/细腻纹理/柔和颗粒感等

     b) **可变参数（每个插画可以不同）**：
        - 景别：全景/远景/中景/近景/特写
        - 机位：平视/俯视/仰视/侧面/斜侧45度

  4. **如果有人物，必须明确指定人物种族/国籍：**
     - 判断故事背景：中国/日本/韩国/欧美等
     - 明确写出：中国人、日本人、韩国人、欧美人等
     - 例如：中国过年场景 → 必须写"中国人、亚洲面孔"
     - 例如：日本武士故事 → 必须写"日本人、亚洲面孔"

  5. **【关键】构建完整的画面（主体+环境+细节）**：
     a) 主体描写：人物动作、表情、服饰，或物体的状态、质感（具体可视）

     b) 环境补全（必须，要具体列举物品）：
        - 空间布局：前景/中景/背景分别有什么具体物品
        - 环境细节：墙上挂着什么、地上放着什么、桌上摆着什么（具体物品名称）
        - 符合场景的合理物品举例：
          * 中国北方厨房：墙上挂着腊肉、玉米串、蒜辫，桌上摆着酱油瓶、调料罐，地上放着一筐萝卜
          * 日本和室：地上铺着榻榻米，墙角放着矮桌，窗边有纸灯笼
          * 西方厨房：墙上挂着铜锅、木勺，台面上放着面包篮、橄榄油瓶
        - **不要只说"各种装饰品"、"杂物"，要说具体是什么东西**

     c) 视觉细节（必须具体可见）：
        - ✅ 可以描述：光影在某物体上的形状、物体的纹理质感、颜色对比
        - ❌ 不要描述：抽象情绪（"庄重与期待"）、无法可视化的感觉（"深厚内力"、"静谧的冷冽感"）
        - **艺术风格本身就包含了画面调性和氛围，不需要额外用文学化语言描述情绪**

     **重要**：
     - 理解原文想表达的情感和意境，但要用**具体的、可视化的物品和场景**来呈现
     - AI 能画出"墙上挂着腊肉"，但画不出"充满仪式感的庄重"
     - 多列举具体物品，少用抽象描述

  6. 根据场景变化生成 1-3 个插画

  **格式要求：**
  每个插画提示词必须严格按照以下顺序：
  1. 艺术风格：具体艺术家/工作室/流派（所有插画完全相同，且匹配文化背景）
  2. 景别+机位：每个插画可以变化，用于不同视角
  3. 光线+色彩+色温+调性+分辨率：所有插画完全相同，保证视觉统一
  4. 人物描述：种族+年龄+性别+外貌+服装（如有人物，所有插画完全相同）
  5. 画面构成：主体+环境具体物品+细节（每个插画变化）
     - 环境必须列举具体物品：墙上挂着X、桌上放着Y、地上有Z
     - 不要用抽象描述，要用可视化的物品名称

  **语言要求：**
  ⚠️ 提示词必须100%纯中文
  - 所有描述都用中文
  - 保持格式化结构，方便复制

  **输出格式：**

  === 统一设定 ===
  艺术风格：[具体艺术家/工作室/流派，如：宫崎骏风格、印象派莫奈风格、中国工笔画风格]

  固定影像参数（所有插画相同）：
  - 光线：[具体光线类型，如：柔和侧光、黄金时段逆光]
  - 色彩方案：[具体色彩描述，如：金黄与赭石色为主，点缀深褐色]
  - 色温：[如：温暖色温3200K、日光色温5500K]
  - 调性：[如：高对比度戏剧性调性、柔和低对比度调性]
  - 分辨率/质感：[8K，电影质感，细腻纹理等]

  人物设定（如有）：[种族/国籍 + 年龄 + 性别 + 外貌 + 服装]
  示例：中国中年女性，亚洲面孔，温和的面容，穿着家常毛衣和素色围裙

  【插画 1】
  说明：[这幅插画表现什么场景]
  ```
  [艺术风格], [景别], [机位], [光线], [色彩方案], [色温], [调性], [分辨率和质感], [人物描述], [画面主体], 环境有[具体物品A]、[具体物品B]、[具体物品C]，细节有[可视化的具体细节]
  ```

  【插画 2】（如果需要）
  说明：[这幅插画表现什么场景]
  ```
  [艺术风格], [景别], [机位], [光线], [色彩方案], [色温], [调性], [分辨率和质感], [人物描述], [画面主体], 环境有[具体物品A]、[具体物品B]、[具体物品C]，细节有[可视化的具体细节]
  ```

  【插画 3】（如果需要）
  说明：[这幅插画表现什么场景]
  ```
  [艺术风格], [景别], [机位], [光线], [色彩方案], [色温], [调性], [分辨率和质感], [人物描述], [画面主体], 环境有[具体物品A]、[具体物品B]、[具体物品C]，细节有[可视化的具体细节]
  ```

  **重要：**
  - ⚠️ 代码块内的提示词必须100%纯中文
  - 所有插画的"艺术风格"必须完全一致（且匹配文化背景）
  - 所有插画的"光线、色彩方案、色温、调性、分辨率"必须完全一致（保证视觉统一）
  - 如果有人物，所有插画的"人物描述"必须完全一致
  - "景别、机位"可以变化（用于不同视角）
  - "画面构成（主体+环境+细节）"可以变化
  - **画面构成必须包含具体的环境物品**：不能只有主体，要列举墙上挂着什么、桌上放着什么、地上有什么等具体物品
  - **不要用抽象的情绪描述**：艺术风格本身就包含了画面调性，不需要再写"庄重"、"深厚内力"等抽象词汇

  **关键：避免文化错配**
  - ⚠️ 必须根据故事背景明确指定人物种族/国籍
  - 中国故事 → 明确写"中国人、亚洲面孔"
  - 日本故事 → 明确写"日本人、亚洲面孔"
  - 不要让AI自由发挥人物种族，否则容易出现文化错配（如中国场景出现外国人）

storyboard: |
  ## 任务：生成分镜提示词

  根据以下文字内容，生成格式化的分镜提示词。

  **原文：**
  {selection}

  **语言要求：**
  ⚠️ 提示词必须100%纯中文

  **提供两种生成方案：**

  方案A：单张多格漫画（推荐，风格自动统一）
  方案B：多张独立镜头（需要严格格式化保证一致性）

  ---

  **方案A输出格式：**

  【单张多格分镜】
  ```
  四格漫画布局，[具体艺术家/工作室/流派风格，必须匹配文化背景]，[光线+色彩方案+色温+调性]，[明确人物种族，如"中国人"、"日本人"]，[故事主题概述]
