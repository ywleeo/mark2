    "小子，愿不愿意做我的记名弟子？"墨大夫问他。

    韩立犹豫了一下，还是答应了。他不知道的是，这个决定会改变他的一生。

    墨大夫教他辨识灵药，教他炼制最基础的丹药。韩立学得很认真，因为他知道，只有学会这些，才能在修仙界活下去。

