    - 必须有故事情节和武打场面，不能只是氛围描写
    - 必须有江湖恩怨或侠义情节

    **输出示例（摘自金庸《天龙八部》）：**
    段誉初见王语嫣，是在曼陀山庄的后园。

    那时他正被人追杀，慌不择路地逃进了一座花园。园中种满了茶花，千红万紫，煞是好看。

    他躲在花丛后喘气，忽然听到有人说话。

    "这是十八学士，那是抓破美人脸，那边是大理茶..."一个女子的声音，清脆悦耳。

    段誉忍不住探头去看——只见一个少女坐在石凳上，正对着一个老妇人说话。

    那少女约莫十七八岁年纪，一张瓜子脸，肤色白腻，容貌清丽秀雅。段誉只看了一眼，便觉心中怦然而动。

    "世上竟有这般美貌的女子！"他心中暗道。

    正看得出神，脚下一滑，踩断了树枝。

    "谁在那里？"老妇人厉声喝道。

    段誉知道躲不过了，只好从花丛中站了出来："在下大理段誉，无意闯入贵庄，还请恕罪。"

    那少女抬眼看了他一眼，便又低下头去，不再说话。

    段誉却觉得这一眼，胜过千言万语。

