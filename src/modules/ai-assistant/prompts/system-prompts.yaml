    若曦第一次见到四爷，是在康熙四十三年的春天。

    那日她正在御花园散步，远远看见一个身着玄色常服的男子，独自站在梅树下。

    他负手而立，看着满树梅花，神色淡漠。那张脸棱角分明，眉目间有种说不出的冷峻。

    若曦认出了他——爱新觉罗·胤禛，四皇子。

    她本想悄悄走开，脚下却踩到了枯枝，发出清脆的"咔"一声。

    他转过头来，目光落在她身上。

    "你是新来的宫女？"他的声音很淡。

    "是，民女马尔泰若曦，给四爷请安。"她福了福身。

    他没有说话，只是看了她一眼，便转身离开了。

    若曦看着他的背影，心里突然有种说不出的感觉。她不知道，这一眼，就是一生。

  novel_wuxia: |

