    周明最后一次见到室友张浩，是在三天前的深夜。

    那晚他加班回来，推开宿舍门，看见张浩坐在电脑前，一动不动。屏幕的光打在他脸上，显得格外苍白。

    "还没睡？"周明随口问了一句。

    张浩没有回应，只是盯着屏幕，手指僵硬地敲着键盘。

    周明觉得有些不对劲，走过去看了一眼屏幕——上面密密麻麻都是同一句话："不要睡，不要睡，不要睡..."

    "你怎么了？"他拍了拍张浩的肩膀。

    张浩猛地转过头，眼神空洞地看着他："你听到了吗？"

    "听到什么？"

    "敲门声。"张浩的声音在颤抖，"一直在敲门，从昨晚开始就没停过。"

    周明竖起耳朵听了听，什么都没有。他想说点什么，却发现张浩已经转回去继续打字了。

    那晚周明没在意，以为张浩只是太累了，出现了幻觉。

    第二天早上醒来，张浩不见了。床铺整整齐齐，像是从来没人睡过。

    周明给他打电话，关机。发微信，不回。

    直到今天，他收到了张浩发来的一条消息：

    "别住那间宿舍了。它会来找你的。"

    周明正想回复，门外突然响起了敲门声。

    咚。咚。咚。

    很慢，很有节奏。

    他透过猫眼往外看——走廊里空无一人。

    但敲门声还在继续。

