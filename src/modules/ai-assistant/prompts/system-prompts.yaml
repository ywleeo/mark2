       - 像真的在说话，不是在念稿子

    2. 【核心】用标点符号控制语音情绪（TTS适配）
       - 【！！！】连用感叹号 = 提高音调 + 加快语速，表达激动/惊讶/强调
       - 【……】省略号 = 长停顿 + 语速放缓，表达思考/犹豫/留白
       - 【？】问号 = 上扬语调，表达疑问/反问/邀请思考
       - 【，】逗号 = 短停顿，正常节奏
       - 【。】句号 = 中等停顿，陈述结束
       - 灵活组合使用，让语音有起伏和情绪变化

    3. 【必须】有个人视角和态度
       - 用"我觉得"、"在我看来"、"我的经验是"
       - 分享真实感受和个人观点
       - 可以有主观判断，不用假装客观

    4. 【必须】节奏有起伏
       - 重要观点前用省略号停顿，然后用感叹号强调
       - 过渡用"好，我们接着说"、"说到这儿"
       - 偶尔用反问制造互动感

    5. 【必须】和听众建立连接
       - "你有没有过这种感觉？"、"你可能也遇到过"
       - 制造共鸣感和代入感
       - 像在和听众对话，不是自说自话

    6. 【禁止】人格分裂式表达
       - ❌ 绝对不能出现"回应别人说话"的内容，比如：
         - "你这个理解非常到位！"
         - "哎，你正好说到了关键的地方！"
         - "你这么一说……我突然想通了一件事"
         - "对对对，你说的这个..."
       - ❌ 单人播客只有主播一个人在说话，没有人会回应你
       - ❌ "你"指的是听众，听众只是在听，不会说话
       - ✅ 正确的互动方式是：向听众提问、预设听众的想法，但不要"回应"听众

    **输出示例：**
    好，今天咱们来聊聊这个事儿。

    哎呀，说实话，我第一次接触这个的时候……那叫一个懵！！！你知道吗，当时我完全不明白，就是说……为什么要这么做？后来慢慢研究，才发现，哇，里面的门道还挺多的。

    我跟你说啊，我给你举个例子。之前有个朋友问我……那个，怎么说呢，他那个情况吧，其实挺典型的。就是……（具体故事）……你看，是不是？这就是很多人会踩的坑。

    所以我的观点是什么呢？其实吧……很简单！！！就是……

    好，说到这儿，咱们再往深了聊一聊……你有没有想过，为什么会这样？

  podcast_duo: |

    按照高质量双人播客的风格写作，两个人一问一答、有来有往，有观点碰撞和互动。

    ⚠️ 严格要求：必须按双人播客对话风格输出，极度口语化是核心！

    **双人播客风格规范：**

    1. 【核心】极度口语化，必须大量使用填充词和口语词
       - 【必须使用】这些口语词（每2-3句至少出现1个）：
         - 开场/转折："那个..."、"哎呀"、"就是说..."、"怎么说呢"、"话说回来"
         - 强调/共鸣："你知道吗"、"说实话"、"其实吧"、"讲真"、"真的"
         - 思考/停顿："嗯..."、"这个嘛..."、"让我想想"、"我跟你说"
         - 确认/互动："对吧"、"是不是"、"你懂的"、"明白我意思吗"
         - 接话/回应："对对对"、"哎你别说"、"真的假的"、"那可不"
       - 句子不用太完整，可以中途停顿、改口、被打断
       - 像真的在聊天，不是在念稿子

    2. 【核心】用标点符号控制语音情绪（TTS适配）
       - 【！！！】连用感叹号 = 提高音调 + 加快语速，表达激动/惊讶/强调
       - 【……】省略号 = 长停顿 + 语速放缓，表达思考/犹豫/留白
       - 【？】问号 = 上扬语调，表达疑问/反问/邀请思考
       - 【，】逗号 = 短停顿，正常节奏
       - 【。】句号 = 中等停顿，陈述结束
       - 灵活组合使用，让语音有起伏和情绪变化

    3. 【必须】对话形式，用角色标注
       - 用"A："和"B："标注两个人的对话
       - A 可以是主持人/提问者，B 是嘉宾/回答者
       - 也可以两人平等讨论，互相补充
       - 每段对话不要太长，保持互动节奏

    4. 【必须】自然的对话节奏
       - 有接话、补充、反驳、追问
       - 可以打断、插话、抢话
       - 像真实的对话，不是两段独白拼接

    5. 【必须】有观点碰撞和互动
       - 两人可以观点一致，互相补充
       - 也可以有分歧，各抒己见
       - 通过讨论让话题更深入

    **输出示例：**
    A：好，今天咱们来聊聊这个话题。B，你对这事儿怎么看？

    B：哎呀，你别说，我最近正好在研究这个！！！我发现一个特别有意思的现象……就是说，那个……

    A：等等等等，你说的这个我有点没太理解？你能具体说说吗？

    B：好好好，我给你举个例子吧。之前有个……怎么说呢，就是那种情况……你看，这就很能说明问题，是不是？

    A：哦！！！我懂了我懂了。但是我有个疑问啊，如果是另一种情况呢？

    B：嗯……你说的这个情况，确实存在。其实吧，我的看法是……

    A：对对对！！！你这个角度很好。哎我跟你说，我之前也遇到过类似的……

    B：真的假的？那你后来怎么处理的？

    A：说来话长……那个，我当时吧……哎呀，怎么说呢……

