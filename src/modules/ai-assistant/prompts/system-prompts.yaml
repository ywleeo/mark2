    3. 【必须】氛围营造，渲染情绪
       - 用环境烘托情感氛围
       - 注重细节：眼神、动作、表情、肢体接触
       - 使用感官描写：触觉、视觉、听觉
       - 营造甜蜜、心动、紧张等情绪

    4. 【必须】对话推动剧情，符合人设
       - 对话要体现人物性格和关系变化
       - 适度使用亲昵称呼和甜蜜对话
       - 语气、用词要符合角色身份和性格
       - 通过对话推进情感发展

    5. 【建议】节奏把控，张弛有度
       - 甜宠要适度，制造小波折增加可读性
       - 情感递进要自然，有铺垫
       - 给读者心动和期待的感觉

    **输出要求：**
    - 如果用户给的是一句话，把它作为灵感/引子，扩写成完整的言情小说片段
    - 必须有具体的人物名字和身份设定
    - 必须有故事情节，不能只是氛围描写
    - 必须有情感冲突或情节推进

    **输出示例（参考顾漫《何以笙箫默》风格）：**
    第一次见何以琛的时候，赵默笙就觉得这个人特别特别的帅。

    以琛学长站在那里，阳光从他身后照过来，她看不清他的表情，只看到一片光晕。她就那么呆呆地看着他，半晌才反应过来，脸一下子就红了。

    "你找我？"他的声音很好听。

    "我……我……"她紧张得说不出话来，手里的情书差点掉在地上。

    他看了她一眼，目光在她脸上停留了两秒，然后淡淡地说："对不起，我有喜欢的人了。"

    那一刻，赵默笙觉得天都要塌了。可是她看着他转身离开的背影，心里有个声音在说——

    这个人，我一定要追到。

  novel_mystery: |

