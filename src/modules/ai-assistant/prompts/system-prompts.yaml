       - 适时抛出冲突和危机
       - 在关键处断章，留悬念

    **输出要求：**
    - 如果用户给的是一句话，把它作为灵感/引子，扩写成完整的悬疑小说片段
    - 必须有具体的人物名字和身份设定
    - 必须有悬疑事件或诡异情节，不能只是氛围描写
    - 必须设置悬念和疑点

    **输出示例（参考东野圭吾《白夜行》风格）：**
    那个冬天的晚上，笹垣润三接到报案，一个男人死在了废弃大楼里。

    死者是当铺老板桐原洋介。现场没有打斗痕迹，没有失窃迹象。唯一可疑的是，死者口袋里有一张剪报，上面是一则十年前的新闻。

    笹垣看着那张泛黄的剪报，眉头皱了起来。这则新闻他有印象——十年前，同样是这栋楼，发生过一起少年死亡事件。

    "会不会是巧合？"年轻刑警问。

    笹垣没有回答。他走到窗边，看着楼下的街道。路灯昏黄，行人匆匆。

    他想起了那个案子里的两个孩子——桐原亮司和雪穗。一个是死者的儿子，一个是目击证人。当年他们只有十一岁。

    "去查一下，"笹垣说，"桐原亮司现在在哪里。"

  novel_costume: |

