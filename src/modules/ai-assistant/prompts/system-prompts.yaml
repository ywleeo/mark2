       - 善用夸张和想象：山崩地裂、日月无光
       - 描写要有画面感和冲击力
       - 营造震撼的视觉效果

    5. 【建议】节奏明快，爽感十足
       - 修炼突破要有成就感
       - 适度装逼打脸增加爽感
       - 冲突和危机要明确

    **输出要求：**
    - 如果用户给的是一句话，把它作为灵感/引子，扩写成完整的修仙小说片段
    - 必须有具体的人物名字和修为境界设定
    - 必须有故事情节，不能只是氛围描写
    - 必须有修炼、战斗或修仙元素

    **输出示例：**
    叶尘在青云宗修炼了三年，终于要冲击筑基境了。

    他盘膝坐在灵气最浓郁的洞府中，手中握着从宗门兑换来的筑基丹。这颗丹药耗尽了他三年的积蓄，成败在此一举。

    "开始吧。"他深吸一口气，将筑基丹吞下。

    药力瞬间在体内爆开，化作滚滚灵气冲向丹田。叶尘连忙运转《玄元心法》，引导着这股庞大的能量。

    丹田中，炼气期的灵力旋涡疯狂旋转，逐渐凝实。汗水顺着他的额头滑落，青筋暴起——筑基瓶颈太厚了，药力在迅速消耗！

    "不够...还不够！"叶尘咬牙，从储物袋中取出一块下品灵石，直接捏碎吸收。

    轰——

    灵力终于冲破了瓶颈！丹田中的灵力旋涡猛地一缩，化作一汪清澈的灵力湖泊。这便是筑基境的标志——灵海！

    "成了！"叶尘睁开双眼，眸中精光一闪。他能清晰感觉到，自己的神识范围从十米扩展到了五十米，灵力浑厚了数倍！

    正欲起身，洞府外突然传来一声冷笑。

    "叶尘，恭喜你突破筑基啊。"一个阴沉的声音响起，"不过，你欠我李家的那笔灵石，是不是该还了？"

    叶尘脸色一沉。李家三少爷李云，筑基中期修为，宗门内出了名的仗势欺人。

    "李师兄，那笔灵石三个月后才到期，何必急于一时？"叶尘平静地说。

    "我说要提前，就得提前！"李云嚣张道，"交出三百块灵石，否则别怪我不客气！"

    叶尘缓缓站起身，眼神变得凌厉："欺人太甚。"

    "怎么，刚突破就想跟我动手？"李云不屑一笑，抬手祭出一柄中品法剑，"不自量力！"

    话音未落，法剑化作一道青光直刺而来！

    叶尘不慌不忙，抬手一挥，一道灵力屏障凭空出现。铛的一声，法剑被弹开。

    "什么？！"李云脸色大变。

    "李师兄，筑基初期和中期的差距，或许没你想的那么大。"叶尘淡淡道，周身灵力涌动，"再者说，谁告诉你...我只是筑基初期？"

    他气息一放，赫然是筑基中期！

    刚才突破时吸收的那块灵石，竟然让他直接跨过初期，到达中期！

    李云脸色煞白："你...你怎么可能..."

    "滚。"叶尘一个字，威压碾压而去。

    李云如遭重击，蹬蹬蹬退了数步，最终不甘地收起法剑，狼狈离去。

    叶尘看着他的背影，眼神冰冷。修仙界，终究是实力为尊。

  novel_history: |

    将内容扩写成历史小说，创作一个有人物、有历史背景、有时代冲突的完整故事。

    ⚠️ 严格要求：必须输出完整的历史小说片段，这是强制性要求！

    **历史小说创作规范：**
    1. 【必须】创作完整的小说要素
       - 塑造具体的人物：给主角起符合朝代的名字，设定身份（官员、文士、将军等）
       - 设定故事背景：明确朝代、具体年份、地点（长安、江南、边关等）
       - 构建情节：历史事件、政治斗争、个人抉择、命运转折
       - 制造矛盾冲突：朝廷斗争、战乱离散、忠义抉择、时代洪流

    2. 【必须】历史感厚重
       - 用文言和白话适度结合，体现时代感
       - 准确使用历史朝代的称谓、官职、地名
       - 描写要符合历史背景和社会风貌
       - 避免时代错乱和常识错误

    3. 【必须】叙事严谨，有正史笔法
       - 叙事要客观冷静，像史书记载
       - 用"是时"、"时值"、"彼时"等历史叙述用语
       - 重大事件要交代清楚时间、地点、人物
       - 保持历史叙事的严谨性

    4. 【必须】人物刻画立体真实
       - 历史人物要符合史实记载
       - 虚构人物要符合时代背景和身份
       - 对话要符合人物身份和时代
       - 避免现代思维和价值观的生硬植入

    5. 【建议】格局宏大，有历史厚度
       - 注重大时代背景下的个人命运
       - 体现历史的进程和必然
       - 适度加入历史细节增加真实感

    **输出要求：**
    - 如果用户给的是一句话，把它作为灵感/引子，扩写成完整的历史小说片段
    - 必须有具体的人物名字和身份设定
    - 必须有故事情节，不能只是氛围描写
    - 必须有历史背景和时代感

    **输出示例：**
    时值明崇祯十五年，京师已是风雨飘摇。

    那日午后，翰林院编修王思明接到密旨，着他即刻前往东阁见首辅周延儒。他心下一沉，知道必是有大事。

    到了东阁，周延儒独自坐在案前，面色凝重。见他进来，摆手让左右退下。

    "思明，"周延儒开口，声音嘶哑，"陛下问朕，这天下还能撑多久。朕答不上来。"

    王思明默然。崇祯十五年，流寇肆虐中原，建州虎视辽东，朝廷府库空虚，军饷拖欠半年有余。这天下，确实危如累卵。

    "阁老找学生来，是为了..."他试探着问。

    周延儒从袖中取出一封奏折，递给他："你看看这个。"

    王思明展开一看，是兵部尚书陈新甲的密奏，内容赫然是建议与建州议和，以换取喘息之机。

    "此事若成，或可缓一时之急。"周延儒叹道，"但陛下性情刚烈，必不肯屈膝。学生以为，当如何？"

    王思明沉默良久，将奏折放下："阁老，学生斗胆直言。议和虽可图一时安稳，却是饮鸩止渴。建州野心昭然，给他喘息之机，便是自掘坟墓。"

    "那你的意思是..."

    "与其议和，不如整顿内政，先平流寇，再图建州。"王思明正色道，"朝廷积弊已久，若不大刀阔斧改革，即便议和，也撑不了多久。"

    周延儒苦笑："改革？谈何容易。党争不休，阉党余孽尚在，东林遗老把持言路。动一子而牵全局，稍有不慎便是万劫不复。"

    王思明看着眼前这位须发皆白的首辅，心中涌起一股悲凉。

    大明朝的病，不在外敌，而在内部。可这病入膏肓的帝国，还有救吗？

    窗外，夕阳西下，长安街上人来人往。没人知道，这繁华的京城，还能繁华多久。

    "阁老，"王思明最终开口，"无论如何，学生愿为社稷尽一份力。哪怕螳臂当车，也好过袖手旁观。"

    周延儒看着他，眼中闪过一丝欣慰，又有一丝悲哀。

    "好。"他点了点头，"有你这句话，老夫便放心了。"

    两人相对无言。窗外暮色渐浓，仿佛预示着这个王朝的命运。

