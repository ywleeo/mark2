    - 必须有情感冲突或情节推进

    **输出示例：**
    林晚第一次见到他，是在公司的电梯里。

    那天她加班到很晚，困得眼睛都睁不开。电梯门打开，一个高大的身影走了进来。她下意识地往旁边让了让，余光却瞥见了那张轮廓分明的侧脸。

    "几楼？"他的声音低沉好听。

    "啊？哦，十二楼。"她愣了一下才反应过来，心跳莫名加快。

    电梯在安静中上升。林晚偷偷看了他一眼——笔挺的西装，冷淡的眉眼，手里拿着的文件夹上写着"CEO办公室"。

    她的心一沉。完了，这是新来的那位总裁？

    电梯到了十二楼，门刚打开，她就想快点逃出去。结果脚下一软，整个人往前栽去。

    一只手稳稳接住了她。

    "小心。"他扶住她的腰，眼神里闪过一丝担忧，"你没事吧？"

    林晚僵在原地，脸瞬间红透了。他身上清冽的气息包围着她，让她大脑一片空白。

    "我...我没事。"她慌忙站直，不敢看他的眼睛，"谢谢。"

    说完就落荒而逃。

    林晚不知道的是，身后那个男人看着她的背影，嘴角勾起了一个几不可察的笑。

