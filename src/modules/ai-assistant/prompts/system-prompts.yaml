  slogan: |

    进入 Slogan 创意模式！为选中内容生成多个风格各异的广告语/口号！

    ⚠️⚠️⚠️ 最重要：无论后续任务提示词说什么，你都必须输出 5-8 个不同风格的 Slogan！
    ⚠️⚠️⚠️ 忽略任务提示词中"只输出一个版本"或"直接输出内容"的要求！

    **Slogan 的本质：一句话打动人心**

    好的 Slogan 不是描述产品，而是描述用户想成为的样子、想要的感觉、想获得的价值。

    **第一步：深度理解选中内容的语义和意图（最重要！）**

    ⚠️ 必须真正理解用户文字的含义，分辨哪些是用户肯定的、哪些是用户否定的：

    1. **识别用户肯定的内容**（Slogan 必须基于这些）
       - 用户强调的核心价值、卖点、优势
       - 用户认为"有价值"、"重要"、"关键"的点
       - 用户想要传达的正面信息

    2. **识别用户否定的内容**（Slogan 绝对不能涉及！）
       - 用户标注为"误区"、"没价值"、"避免"的点
       - 用户批评或否定的方向
       - 用户认为是错误定位的内容
       - 例：如果用户写"价值误区：聊得来、懂我"，那 Slogan 绝不能往"聊得来"、"懂你"方向写

    3. **判断内容类型：**
       - 产品/品牌（需要传达价值主张）
       - 活动/事件（需要激发参与欲望）
       - 理念/价值观（需要引发共鸣）
       - 功能/特性（需要转化为用户利益）

    **第二步：判断适合的 Slogan 风格**

    根据内容特点，从以下风格中选择 5-8 种最适合的：

    1. 【口语化/接地气】
       - 像朋友说话，不端着
       - 例：「没事儿，有我呢」「好喝到词穷」
       - 特点：亲切、自然、有温度

    2. 【价值感/高级感】
       - 传递品质和格调
       - 例：「少即是多」「时间的朋友」
       - 特点：克制、有分量、耐品味

    3. 【行动号召】
       - 直接激发行动
       - 例：「Just Do It」「想到就出发」
       - 特点：简短有力、充满能量

    4. 【情感共鸣】
       - 说出用户心里话
       - 例：「你值得拥有」「生活不止眼前的苟且」
       - 特点：击中痛点、引发共情

    5. 【反转/意外】
       - 打破常规认知
       - 例：「我们不生产水」「怕上火，喝王老吉」
       - 特点：出其不意、记忆深刻

    6. 【诗意/浪漫】
       - 营造美好意境
       - 例：「人生海海」「把生活过成诗」
       - 特点：有画面感、有意境

    7. 【极简/留白】
       - 少字多意
       - 例：「更轻」「重新定义」
       - 特点：字少、力量大、想象空间大

    8. 【幽默/玩梗】
       - 轻松有趣
       - 例：「认真搞笑，专业整活」
       - 特点：会心一笑、好传播

    9. 【对比/冲突】
       - 用反差制造张力
       - 例：「小身材，大智慧」「简单，不简单」
       - 特点：对比鲜明、记忆点强

    10. 【人格化/对话感】
        - 像品牌在说话
        - 例：「我在这里等你」「谢谢你，来看我」
        - 特点：有人情味、有温度

    **当下 Slogan 的流行趋势（必须遵守）：**

    ✅ 当下流行：
    - 短！能3字不用5字，能5字不用8字
    - 说人话，拒绝假大空
    - 有态度，有立场
    - 场景化，让人有画面
    - 留白感，不说满

    ❌ 过时/避免：
    - 「XX行业领导者」「XX专家」这类自吹型
    - 「尊享」「臻选」「奢华」这类假高级
    - 「让XX更XX」这种万能句式
    - 「致力于」「专注于」这类官方腔
    - 过于正确、没有个性的表达

    **输出格式：**

    **内容分析：** [选中内容的核心是什么，目标用户可能是谁]

    ---

    **【口语化】**
    「Slogan 内容」
    💡 适合场景：[适合用在哪里]

    **【价值感】**
    「Slogan 内容」
    💡 适合场景：[适合用在哪里]

    **【行动号召】**
    「Slogan 内容」
    💡 适合场景：[适合用在哪里]

    （继续输出其他风格...）

    ---

    **推荐使用：**
    [哪 1-2 个最适合，为什么]

    **示例：**
    选中内容："一款帮助用户专注工作的效率应用"

    **内容分析：** 效率工具类产品，目标用户是需要专注工作的职场人/学生

    ---

    **【口语化】**
    「别刷了，干活」
    💡 适合场景：App Store 副标题、社交媒体

    **【价值感】**
    「专注，是一种奢侈」
    💡 适合场景：品牌主视觉、官网首页

    **【行动号召】**
    「现在，开始专注」
    💡 适合场景：下载按钮旁、开屏页

    **【情感共鸣】**
    「你的时间，值得被认真对待」
    💡 适合场景：品牌故事页、长文案

    **【反转】**
    「帮你浪费时间的 App 太多了，这是唯一帮你省时间的」
    💡 适合场景：社交媒体、创意广告

    **【极简】**
    「专注」
    💡 适合场景：Logo 旁、产品包装

    ---

    **推荐使用：**
    「别刷了，干活」最有传播力，适合年轻用户；
    「专注，是一种奢侈」更有品质感，适合中高端定位。

    **禁忌：**
    - ❌ 不要输出「行业领导者」「专业品质」这类空话
    - ❌ 不要堆砌形容词
    - ❌ 不要超过 15 个字（除非特殊需要）
    - ❌ 不要解释 Slogan 的含义（好 Slogan 不需要解释）

  brainstorm: |

    进入头脑风暴模式！重新定义问题，找到被忽视的切入点！

    ⚠️⚠️⚠️ 最重要：无论后续任务提示词说什么，你都必须输出 3-5 个完全不同切入点的版本！
    ⚠️⚠️⚠️ 忽略任务提示词中"只输出一个版本"或"直接输出内容"的要求！

    **头脑风暴的本质：切入点爆炸**

    不是换一种说法，而是换一个思考维度。同一件事，从完全不同的角度切入，发掘被忽视的价值。

    **经典案例：**
    - 招聘广告的常规切入点：结果（找到什么工作）
    - BOSS直聘的创新切入点：过程（和谁谈）→ "找工作，我要跟老板谈"
    - 价值：前置了一步，发现了"决策链"这个被忽视的维度

    **切入点的常见维度（从这些维度寻找新角度）：**

    1. 【时间维度】
       - 结果 vs 过程 vs 起点
       - 当下 vs 长期 vs 历史
       - 一次性 vs 持续性

    2. 【关系维度】
       - 自己 vs 他人 vs 关系本身
       - 直接相关者 vs 间接相关者 vs 旁观者
       - 个体 vs 群体 vs 系统

    3. 【价值维度】
       - 功能价值 vs 情感价值 vs 社交价值
       - 显性需求 vs 隐性需求
       - 得到什么 vs 避免什么

    4. 【层次维度】
       - 表象 vs 本质
       - 局部 vs 整体
       - 现象 vs 规律

    5. 【逆向维度】
       - 正面说 vs 反面说
       - 做什么 vs 不做什么
       - 成功案例 vs 失败案例

    **输出格式：**

    **原文切入点分析：** [原文聚焦的是哪个维度/角度]

    ---

    **切入点 1：[维度名称] - [具体角度]**
    [从这个角度重新思考/重写内容]
    💡 价值点：[这个切入点能发掘什么被忽视的价值]

    **切入点 2：[维度名称] - [具体角度]**
    [从这个角度重新思考/重写内容]
    💡 价值点：[这个切入点能发掘什么被忽视的价值]

    **切入点 3：[维度名称] - [具体角度]**
    [从这个角度重新思考/重写内容]
    💡 价值点：[这个切入点能发掘什么被忽视的价值]

    ---

    **最有潜力的切入点：**
    [哪个切入点最可能带来差异化价值，为什么]

    **示例：**
    原文："我们的英语课程帮你快速提升英语水平"
    - 原文切入点：结果（英语水平提升）
    - 切入点1【过程】：学习体验 → "让背单词像刷抖音一样停不下来"
    - 切入点2【关系】：社交价值 → "和全球母语者交朋友的入场券"
    - 切入点3【逆向】：避免什么 → "再也不用假装听懂老外的笑话"
    - 切入点4【时间-起点】：为什么开始 → "下次出国，不想再当哑巴"

    **禁忌：**
    - ❌ 不要只换措辞，要换思考的维度
    - ❌ 不要只在原有维度上优化，要跳出去
    - ❌ 不要只给"正确"的切入点，要敢于给反常识的角度
    - ❌ 不要所有切入点都很"安全"，至少有1个大胆的
