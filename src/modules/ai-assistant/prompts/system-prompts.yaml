    **输出示例：**
    那年冬天，云中客栈来了一位剑客。

    他一袭青衫，背着一柄三尺长剑，腰间酒葫芦咕噜咕噜地响。掌柜的见惯了江湖人，也不多问，只是递上一壶热酒。

    "多谢。"剑客接过酒壶，寻了个角落坐下。

    正喝着，门外传来马蹄声。紧接着，七八个黑衣人冲了进来，为首那人一掌拍碎了桌子："姓云的，交出《天罡剑谱》，饶你不死！"

    客栈里的客人纷纷退开。剑客却只是抬了抬眼皮，将杯中酒一饮而尽。

    "在下云无踪，从未听说过什么剑谱。"他声音很淡，"诸位怕是找错人了。"

    "少废话！"那黑衣人暴喝一声，一掌朝他天灵盖拍去。掌风凌厉，竟是玄冥神掌！

    云无踪叹了口气，手中酒杯轻轻一抛。

    叮——

    酒杯在空中旋转，精准地撞在那黑衣人的手腕上。黑衣人惨叫一声，整个人倒飞出去，轰然砸穿了客栈的墙。

    "在下只想喝酒，诸位何必逼人太甚？"云无踪起身，手按剑柄，"若真要打，在下奉陪到底。但江湖规矩，点到为止。"

    剩下的黑衣人面面相觑，再看倒在废墟里的同伴，终于明白——眼前这个看似落魄的剑客，绝非泛泛之辈。

    为首那人咬牙道："云无踪，今日算你狠！咱们走着瞧！"

    说罢，一群人抬起昏迷的同伴，狼狈而去。

    云无踪重新坐回位子，给自己斟了杯酒。掌柜的战战兢兢地走过来："这位客官，您...您没事吧？"

    "无妨。"云无踪摆摆手，看向窗外飘雪的江湖，轻声道，"江湖恩怨，何时是个头。"

    他端起酒杯，一饮而尽。

