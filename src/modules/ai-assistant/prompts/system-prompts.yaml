    - 必须有历史背景和时代感

    **输出示例（参考二月河《雍正皇帝》风格）：**
    康熙六十一年十一月十三日，畅春园。

    这一天，康熙皇帝驾崩了。

    胤禛接到消息时，正在府中。他放下手中的折子，沉默了很久。

    "四爷，"太监何柱儿小心翼翼地说，"该进宫了。"

    胤禛点点头，起身整理了一下衣冠。他知道，从这一刻起，一切都不一样了。

    到了畅春园，诸位皇子都已到齐。老八胤禩、老九胤禟、老十胤䄉...一个个神色各异。

    隆科多走了过来，递给他一个黄匣子："四爷，这是圣祖遗诏。"

    胤禛接过匣子，打开一看——上面写着："传位于皇四子胤禛。"

    他抬起头，看向众人。有人惊讶，有人不甘，有人面色阴沉。

    "诸位皇兄弟，"胤禛的声音很平静，"父皇宾天，朕心痛如绞。但国不可一日无君。从今日起，朕当继承大统，为天下苍生计。"

    老八胤禩冷笑一声，没有说话。

    胤禛看着他，心里很清楚——这只是开始。真正的较量，还在后面。

