<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark2 - Markdown 编辑器</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z/C/HwAF/gL+dlz7WwAAAABJRU5ErkJggg==" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/app.css">
    <link rel="stylesheet" href="/styles/editor.css">
    <link rel="stylesheet" href="/styles/highlight.css">
    <link rel="stylesheet" href="/styles/file-tree.css">
    <link rel="stylesheet" href="/styles/settings.css">
    <link rel="stylesheet" href="/styles/code-editor.css">
    <link rel="stylesheet" href="/styles/image-viewer.css">
    <link rel="stylesheet" href="/styles/image-modal.css">
    <link rel="stylesheet" href="/styles/media-viewer.css">
    <link rel="stylesheet" href="/styles/spreadsheet-viewer.css">
    <link rel="stylesheet" href="/styles/pdf-viewer.css">
    <link rel="stylesheet" href="/styles/search.css">
    <link rel="stylesheet" href="/styles/ai.css">
    <link rel="stylesheet" href="/styles/markdown-toolbar.css">
</head>
<body>
    <!-- 自定义标题栏 -->
    <div id="titlebar" data-tauri-drag-region>
        <div class="titlebar-title" data-tauri-drag-region></div>
        <button id="theme-toggle" class="titlebar-theme-toggle" aria-label="切换主题">
            <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>

    <!-- 侧边栏 -->
    <div id="sidebar" class="sidebar">
        <div id="fileTree"></div>
    </div>

    <div id="sidebarResizer" class="sidebar-resizer"></div>

    <!-- 主内容区 -->
    <div class="content-wrapper">
        <!-- 标签栏 -->
        <div id="tabBar" class="tab-bar"></div>

        <!-- 编辑器/预览区 -->
        <div id="contentArea" class="content-area">
            <div class="content-main">
                <div id="viewContent" class="view-content"></div>
            </div>
            <div id="aiSidebar" class="ai-sidebar"></div>
        </div>

        <!-- 状态栏 -->
        <div id="statusBar" class="status-bar" role="status" aria-live="polite">
            <div id="statusBarPath" class="status-item status-item-path"></div>
            <div id="statusBarProgress" class="status-item status-item-progress" aria-hidden="true">
                <span class="status-progress-indicator" aria-hidden="true"></span>
                <span id="statusBarProgressText" class="status-progress-text"></span>
            </div>
            <div id="statusBarZoom" class="status-item status-item-zoom">
                <button type="button" class="status-zoom-btn" data-zoom="out" aria-label="缩小">−</button>
                <span id="statusBarZoomValue" class="status-zoom-value">100%</span>
                <button type="button" class="status-zoom-btn" data-zoom="in" aria-label="放大">＋</button>
            </div>
            <div id="statusBarPageInfo" class="status-item status-item-page"></div>
            <div id="statusBarWordCount" class="status-item status-item-word-count"></div>
            <div id="statusBarLastModified" class="status-item status-item-last-modified"></div>
        </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" class="search-input" placeholder="查找...">
        <input type="text" class="replace-input" placeholder="替换为...">
        <span class="search-info"></span>
        <button class="search-button multi-btn" title="批量选中 / 全部替换（⌘+Shift+L）" aria-label="批量选中 / 全部替换">
            <svg viewBox="0 0 24 24" class="multi-icon" aria-hidden="true" focusable="false">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </button>
        <button class="search-button prev-btn" title="上一个">↑</button>
        <button class="search-button next-btn" title="下一个">↓</button>
        <button class="search-button close-btn" title="关闭">×</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
